name: Pipeline SaludPlus
on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4
        
      - name: Configurar Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'oracle' 
          cache: maven

      - name: Compilar con Maven
        run: |
          # Esto busca el pom.xml en cualquier subcarpeta
          POM_PATH=$(find . -name "pom.xml" | head -n 1)
          cd $(dirname "$POM_PATH")
          # Da permisos al ejecutable de maven y compila saltando tests
          chmod +x mvnw || true
          ./mvnw package -DskipTests
